<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-SPORT AIサポート</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy: #1C2B3A;
    --navy-light: #243649;
    --red: #C0392B;
    --white: #ffffff;
    --gray-50: #F8F9FA;
    --gray-100: #F1F3F5;
    --gray-200: #E9ECEF;
    --gray-400: #ADB5BD;
    --gray-600: #6C757D;
    --gray-800: #343A40;
    --ok: #1A7A44;
    --ok-bg: #E8F8F0;
    --warn: #9A6B00;
    --warn-bg: #FEF8E7;
    --shadow: 0 2px 12px rgba(0,0,0,0.08);
    --shadow-lg: 0 8px 40px rgba(0,0,0,0.14);
  }

  html, body {
    height: 100%;
    font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', Meiryo, sans-serif;
    background: var(--gray-100);
    color: var(--gray-800);
    font-size: 15px;
  }

  /* ── Header ── */
  header {
    background: var(--navy);
    padding: 0 24px;
    height: 56px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: fixed;
    top: 0; left: 0; right: 0;
    z-index: 100;
    box-shadow: 0 1px 0 rgba(255,255,255,0.06);
  }
  .hd-left { display: flex; align-items: center; gap: 10px; }
  .hd-logo {
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 0.06em;
  }
  .hd-divider { width: 1px; height: 18px; background: rgba(255,255,255,0.2); }
  .hd-sub { font-size: 12px; color: rgba(255,255,255,0.55); letter-spacing: 0.04em; }
  .hd-status { display: flex; align-items: center; gap: 6px; font-size: 12px; color: rgba(255,255,255,0.5); }
  .dot-live { width: 7px; height: 7px; border-radius: 50%; background: #2ECC71; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }

  /* ── Layout ── */
  main {
    max-width: 680px;
    margin: 0 auto;
    padding: 80px 16px 200px;
    min-height: 100vh;
  }

  /* ── Chat log ── */
  #log {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .msg-row { display: flex; align-items: flex-end; gap: 10px; }
  .msg-row.user { flex-direction: row-reverse; }

  .avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 600;
    flex-shrink: 0;
  }
  .avatar.bot { background: var(--navy); color: var(--white); font-size: 11px; }
  .avatar.user { background: var(--gray-200); color: var(--gray-600); font-size: 15px; }

  .bubble {
    max-width: 78%;
    padding: 12px 16px;
    border-radius: 18px;
    line-height: 1.65;
    font-size: 14px;
    animation: rise 0.22s ease;
  }
  @keyframes rise { from { opacity:0; transform:translateY(6px) } to { opacity:1; transform:none } }

  .bubble.bot {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-bottom-left-radius: 4px;
    box-shadow: var(--shadow);
  }
  .bubble.user {
    background: var(--navy);
    color: var(--white);
    border-bottom-right-radius: 4px;
  }

  .think-row { display: flex; align-items: flex-end; gap: 10px; }
  .think-bubble {
    background: var(--white);
    border: 1px solid var(--gray-200);
    border-radius: 18px; border-bottom-left-radius: 4px;
    padding: 14px 18px;
    display: flex; gap: 5px; align-items: center;
    box-shadow: var(--shadow);
  }
  .td { width: 7px; height: 7px; border-radius: 50%; background: var(--gray-400); animation: blink 1.1s infinite; }
  .td:nth-child(2) { animation-delay: .2s; }
  .td:nth-child(3) { animation-delay: .4s; }
  @keyframes blink { 0%,80%,100%{opacity:.2} 40%{opacity:1} }

  /* ── Product card inside bubble ── */
  .p-card {
    margin-top: 10px;
    border: 1px solid var(--gray-200);
    border-radius: 12px;
    overflow: hidden;
    font-size: 13px;
    background: var(--gray-50);
  }
  .p-card-head {
    padding: 9px 14px;
    background: var(--navy);
    color: var(--white);
    font-weight: 600;
    font-size: 13px;
  }
  .p-card-body { padding: 10px 14px; display: flex; flex-direction: column; gap: 6px; }
  .p-row { display: flex; justify-content: space-between; }
  .p-label { color: var(--gray-600); }
  .p-val { font-weight: 600; color: var(--gray-800); }
  .badge {
    font-size: 11px; padding: 2px 9px; border-radius: 20px; font-weight: 600;
  }
  .badge.ok { background: var(--ok-bg); color: var(--ok); }
  .badge.warn { background: var(--warn-bg); color: var(--warn); }
  .badge.ng { background: #FDEDED; color: #A32D2D; }
  .p-card-link {
    display: block; padding: 8px 14px;
    border-top: 1px solid var(--gray-200);
    font-size: 12px; color: #185FA5;
    text-decoration: none;
    background: var(--white);
  }
  .p-card-link:hover { background: var(--gray-50); }

  /* ── Escalation notice ── */
  .esc-notice {
    background: var(--warn-bg);
    border: 1px solid #F0B429;
    border-radius: 12px;
    padding: 12px 16px;
    font-size: 13px;
    color: var(--warn);
    display: flex; gap: 10px; align-items: flex-start;
  }
  .esc-notice a { color: var(--warn); font-weight: 600; }

  /* ── Quick stamps ── */
  .stamps-wrap {
    display: flex; flex-wrap: wrap; gap: 8px;
    margin-top: 20px;
  }
  .stamp {
    padding: 8px 14px;
    border-radius: 20px;
    border: 1px solid var(--gray-200);
    background: var(--white);
    font-size: 13px;
    cursor: pointer;
    color: var(--gray-800);
    box-shadow: var(--shadow);
    transition: all .15s;
    white-space: nowrap;
  }
  .stamp:hover { background: var(--gray-50); border-color: var(--gray-400); transform: translateY(-1px); }

  /* ── Bottom bar ── */
  .bottom-bar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1px solid var(--gray-200);
    padding: 14px 20px 20px;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
  }
  .bottom-inner {
    max-width: 680px;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 12px;
  }

  /* Mic button */
  .mic-area { display: flex; flex-direction: column; align-items: center; gap: 8px; }
  #micBtn {
    width: 64px; height: 64px;
    border-radius: 50%;
    border: none;
    background: var(--navy);
    color: var(--white);
    font-size: 26px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all .2s;
    box-shadow: var(--shadow-lg);
    position: relative;
  }
  #micBtn:hover { transform: scale(1.05); }
  #micBtn.listening {
    background: var(--red);
    animation: mic-pulse 1.5s infinite;
  }
  #micBtn.speaking { background: #1A7A44; }
  @keyframes mic-pulse {
    0%,100% { box-shadow: 0 0 0 0 rgba(192,57,43,0.4); }
    50% { box-shadow: 0 0 0 14px rgba(192,57,43,0); }
  }
  #micLabel {
    font-size: 12px;
    color: var(--gray-600);
    text-align: center;
    min-height: 18px;
  }

  /* Text input row */
  .text-row {
    display: flex; gap: 8px; width: 100%;
  }
  #textInp {
    flex: 1;
    border: 1px solid var(--gray-200);
    border-radius: 24px;
    padding: 10px 16px;
    font-size: 14px;
    font-family: inherit;
    background: var(--gray-50);
    outline: none;
    transition: border .15s;
  }
  #textInp:focus { border-color: var(--navy); background: var(--white); }
  #sendBtn {
    width: 42px; height: 42px;
    border-radius: 50%;
    border: none;
    background: var(--navy);
    color: var(--white);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  #sendBtn:hover { opacity: .8; }
  #sendBtn:disabled { opacity: .35; cursor: default; }

  .bottom-note {
    font-size: 11px;
    color: var(--gray-400);
    text-align: center;
  }

  /* Ripple around mic when listening */
  .ripple {
    position: absolute;
    inset: -8px;
    border-radius: 50%;
    border: 2px solid rgba(192,57,43,0.5);
    animation: ripple 1.5s infinite;
    pointer-events: none;
  }
  @keyframes ripple {
    from { opacity:1; transform:scale(1); }
    to { opacity:0; transform:scale(1.6); }
  }
</style>
</head>
<body>

<header>
  <div class="hd-left">
    <div class="hd-logo">D-SPORT</div>
    <div class="hd-divider"></div>
    <div class="hd-sub">AIサポート</div>
  </div>
  <div class="hd-status">
    <div class="dot-live"></div>
    音声・テキスト対応
  </div>
</header>

<main>
  <div id="log">
    <div class="msg-row">
      <div class="avatar bot">DS</div>
      <div class="bubble bot">
        こんにちは。D-SPORTのAIサポートです。<br>
        パーツの適合・商品に関するご質問にお答えします。<br><br>
        マイクボタンを押してお話しいただくか、テキストでご入力ください。
      </div>
    </div>
  </div>

  <div class="stamps-wrap" id="stamps">
    <div class="stamp" onclick="tapStamp('コペンLA400Kに合うマフラーを教えてください')">🔍 コペンのマフラー</div>
    <div class="stamp" onclick="tapStamp('タフトに付くサスペンションはありますか')">🚙 タフトのサス</div>
    <div class="stamp" onclick="tapStamp('品番17400-B240について教えてください')">🔢 品番から検索</div>
    <div class="stamp" onclick="tapStamp('S-SPECサスペンションはまだ購入できますか')">⚠️ 廃番・在庫確認</div>
  </div>
</main>

<div class="bottom-bar">
  <div class="bottom-inner">
    <div class="mic-area">
      <button id="micBtn" onclick="toggleMic()" title="マイクボタン">
        🎤
      </button>
      <div id="micLabel">タップして話す</div>
    </div>
    <div class="text-row">
      <input type="text" id="textInp" placeholder="テキストで入力することもできます..."
             onkeydown="if(event.key==='Enter')sendText()">
      <button id="sendBtn" onclick="sendText()">➤</button>
    </div>
    <div class="bottom-note">
      ※在庫状況はリアルタイムでは確認できません。最終確認は取扱店にてお願いします。
    </div>
  </div>
</div>

<script>
// ── State ──
let history = [];
let recognition = null;
let synth = window.speechSynthesis;
let isListening = false;
let isSpeaking = false;
let busy = false;

// ── Speech Recognition Setup ──
function setupRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) return null;
  const r = new SR();
  r.lang = 'ja-JP';
  r.continuous = false;
  r.interimResults = false;

  r.onstart = () => {
    isListening = true;
    setMicState('listening');
  };

  r.onresult = (e) => {
    const text = e.results[0][0].transcript;
    stopListening();
    sendMessage(text);
  };

  r.onerror = (e) => {
    stopListening();
    if (e.error !== 'aborted') {
      addMsg('音声認識でエラーが発生しました。テキストでご入力ください。', 'bot');
    }
  };

  r.onend = () => {
    if (isListening) stopListening();
  };

  return r;
}

let greeted = false;

function toggleMic() {
  if (isSpeaking) {
    if (currentAudio) { currentAudio.pause(); currentAudio = null; }
    isSpeaking = false;
    setMicState('idle');
    return;
  }
  if (isListening) {
    stopListening();
    return;
  }
  if (!greeted) {
    greeted = true;
    speakThenListen('お電話ありがとうございます。D-SPORTのAIサポートです。パーツの適合・商品に関するご質問にお答えします。');
  } else {
    startListening();
  }
}

async function speakThenListen(text) {
  await speak(text);
  setTimeout(() => startListening(), 500);
}

function startListening() {
  if (!recognition) recognition = setupRecognition();
  if (!recognition) {
    alert('お使いのブラウザは音声認識に対応していません。Chrome または Edge をお試しください。');
    return;
  }
  recognition.start();
}

function stopListening() {
  isListening = false;
  if (recognition) try { recognition.stop(); } catch(e) {}
  setMicState('idle');
}

function setMicState(state) {
  const btn = document.getElementById('micBtn');
  const lbl = document.getElementById('micLabel');
  btn.className = '';
  btn.innerHTML = '';
  const ripple = document.createElement('div');
  ripple.className = 'ripple';

  if (state === 'listening') {
    btn.classList.add('listening');
    btn.innerHTML = '🔴';
    btn.appendChild(ripple);
    lbl.textContent = '聞いています... (タップで停止)';
  } else if (state === 'speaking') {
    btn.classList.add('speaking');
    btn.innerHTML = '🔊';
    lbl.textContent = '読み上げ中... (タップで停止)';
  } else {
    btn.innerHTML = '🎤';
    lbl.textContent = 'タップして話す';
  }
}

// ── Text input ──
function tapStamp(text) {
  document.getElementById('stamps').style.display = 'none';
  sendMessage(text);
}

function sendText() {
  const inp = document.getElementById('textInp');
  const text = inp.value.trim();
  if (!text || busy) return;
  inp.value = '';
  document.getElementById('stamps').style.display = 'none';
  sendMessage(text);
}

// ── Render helpers ──
function addMsg(html, type) {
  const log = document.getElementById('log');
  const row = document.createElement('div');
  row.className = 'msg-row' + (type === 'user' ? ' user' : '');

  if (type !== 'user') {
    const av = document.createElement('div');
    av.className = 'avatar bot';
    av.textContent = 'DS';
    row.appendChild(av);
  }

  const bub = document.createElement('div');
  bub.className = 'bubble ' + type;
  bub.innerHTML = html;
  row.appendChild(bub);

  if (type === 'user') {
    const av = document.createElement('div');
    av.className = 'avatar user';
    av.textContent = '👤';
    row.appendChild(av);
  }

  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  setTimeout(() => log.scrollTop = log.scrollHeight, 50);
  return row;
}

function addThink() {
  const log = document.getElementById('log');
  const row = document.createElement('div');
  row.className = 'think-row';
  const av = document.createElement('div');
  av.className = 'avatar bot'; av.textContent = 'DS';
  const bub = document.createElement('div');
  bub.className = 'think-bubble';
  bub.innerHTML = '<div class="td"></div><div class="td"></div><div class="td"></div>';
  row.appendChild(av); row.appendChild(bub);
  log.appendChild(row);
  log.scrollTop = log.scrollHeight;
  return row;
}

function makeCard(m) {
  const st = m.status === '販売中' ? 'ok' : m.status.includes('在庫') ? 'warn' : 'ng';
  const url = 'https://www.dsport-web.com/product/';
  return `<div class="p-card">
    <div class="p-card-head">${m.name}</div>
    <div class="p-card-body">
      <div class="p-row"><span class="p-label">対象車種</span><span class="p-val">${m.model}（${m.type}）</span></div>
      <div class="p-row"><span class="p-label">品番</span><span class="p-val" style="font-family:monospace">${m.code}</span></div>
      <div class="p-row"><span class="p-label">税込価格</span><span class="p-val">¥${m.price}</span></div>
      <div class="p-row"><span class="p-label">販売状況</span><span class="badge ${st}">${m.status}</span></div>
    </div>
    <a href="${m.url||url}" class="p-card-link" target="_blank" rel="noopener">🔗 商品ページを見る →</a>
  </div>`;
}

function parseMatches(txt) {
  const re = /\[MATCH\|([^\]]+)\]/g;
  const out = []; let m;
  while ((m = re.exec(txt)) !== null) {
    const p = m[1].split('|');
    if (p.length >= 6) out.push({ name:p[0], code:p[1], model:p[2], type:p[3], price:p[4], status:p[5], url:p[6]||'' });
  }
  return out;
}

// ── TTS (OpenAI) ──
let currentAudio = null;

async function speak(text) {
  if (!text) return;
  return new Promise(async (resolve) => {
    try {
      if (currentAudio) {
        currentAudio.pause();
        currentAudio = null;
      }
      isSpeaking = true;
      setMicState('speaking');

      const res = await fetch('/api/tts', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ text }),
      });
      if (!res.ok) throw new Error('TTS error');

      const blob = await res.blob();
      const url = URL.createObjectURL(blob);
      const audio = new Audio(url);
      currentAudio = audio;

      audio.onended = () => {
        isSpeaking = false;
        setMicState('idle');
        URL.revokeObjectURL(url);
        currentAudio = null;
        resolve();
        if (greeted) {
          setTimeout(() => startListening(), 1000);
        }
      };
      audio.onerror = () => {
        isSpeaking = false;
        setMicState('idle');
        currentAudio = null;
        resolve();
      };
      audio.play();
    } catch(e) {
      isSpeaking = false;
      setMicState('idle');
      resolve();
    }
  });
}

// ── Main send ──
async function sendMessage(text) {
  if (busy) return;
  busy = true;
  document.getElementById('sendBtn').disabled = true;

  addMsg(escHtml(text), 'user');
  history.push({ role: 'user', content: text });

  const think = addThink();

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history }),
    });

    if (!res.ok) throw new Error('HTTP ' + res.status);
    const resText = await res.text();
    let data;
    try { data = JSON.parse(resText); } catch(e) { throw new Error('Parse error'); }
    if (data.error) throw new Error(data.error.message || JSON.stringify(data.error));
    const raw = (data.content && data.content[0] && data.content[0].text) ? data.content[0].text : null;
    if (!raw) throw new Error('No content');
    history.push({ role: 'assistant', content: raw });

    think.remove();

    const isEsc = raw.includes('[ESC]') || raw.startsWith('[ESC]');
    const matches = parseMatches(raw);
    const clean = raw.replace(/\[ESC\]/g, '').replace(/\[MATCH\|[^\]]+\]/g, '').trim();

    if (isEsc) {
      const log = document.getElementById('log');
      const esc = document.createElement('div');
      esc.className = 'esc-notice';
      esc.innerHTML = '⚠️ &nbsp;<span>このご質問は担当スタッフが対応いたします。<br><a href="https://www.dsport-web.com/contact/" target="_blank">お問い合わせフォーム</a>よりご連絡ください。</span>';
      log.appendChild(esc);
    }

    let html = escHtml(clean).replace(/\n/g, '<br>');
    matches.forEach(m => { html += makeCard(m); });
    addMsg(html, 'bot');

    // 音声読み上げ（商品カード部分を除いたテキストのみ）
    const speakText = clean.replace(/https?:\/\/\S+/g, '').trim();
    speak(speakText);

  } catch (e) {
    think.remove();
    addMsg('通信エラーが発生しました。しばらくしてから再度お試しください。', 'bot');
  }

  busy = false;
  document.getElementById('sendBtn').disabled = false;
}

function escHtml(t) {
  return t.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// voices の読み込みを待つ
if (synth) speechSynthesis.onvoiceschanged = () => {};
</script>
</body>
</html>
